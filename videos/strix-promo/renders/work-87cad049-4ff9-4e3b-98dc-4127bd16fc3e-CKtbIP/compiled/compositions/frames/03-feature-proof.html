      <script>

        const tl = gsap.timeline({ paused: true });

        const counters = Array.from(
          document.querySelectorAll("[data-composition-id='03-feature-proof'] [data-count]")

        tl.fromTo(
          "[data-composition-id='03-feature-proof'] .bg",
          { opacity: 0, scale: 1.04 },
          { opacity: 1, scale: 1, duration: 0.9, ease: "power2.out" },
          0
        );
        tl.fromTo(
          "[data-composition-id='03-feature-proof'] .grid",
          { opacity: 0, y: 14 },
          { opacity: 0.34, y: 0, duration: 0.8, ease: "power2.out" },
          0.06
        );
        tl.fromTo(
          "[data-composition-id='03-feature-proof'] .hero",
          { x: -12, opacity: 0, scale: 0.98 },
          { x: 0, opacity: 1, scale: 1, duration: 1.0, ease: "power4.out" },
          0.1

        tl.fromTo(
          "[data-composition-id='03-feature-proof'] .eyebrow",
          { y: 14, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.72, ease: "power3.out" },
          0.16
        );
        tl.fromTo(
          "[data-composition-id='03-feature-proof'] h1",
          { y: 42, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.9, ease: "power4.out" },
          0.22
        );
        tl.fromTo(
          "[data-composition-id='03-feature-proof'] .sub",
          { y: 18, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.72, ease: "power3.out" },

        );

          "[data-composition-id='03-feature-proof'] .metric",
          { y: 20, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.72, stagger: 0.08, ease: "power3.out" },
          0.58
        );
        tl.fromTo(
          "[data-composition-id='03-feature-proof'] .result",
          { y: 24, opacity: 0, scale: 0.985 },
          { y: 0, opacity: 1, scale: 1, duration: 0.86, ease: "power3.out" },
          1.02
        );
        tl.fromTo(
          "[data-composition-id='03-feature-proof'] .badge",
          { y: 10, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.72, ease: "power3.out" },
          0.76
        );
        tl.fromTo(
          counters[0],
          {
            value: 0,
            onUpdate() {
              counters[0].el.textContent = String(Math.round(counters[0].value)).padStart(2, "0");
            },
          },
          {
            value: counters[0].target,
            duration: 1.1,
            ease: "power1.out",
            onUpdate() {
              counters[0].el.textContent = String(Math.round(counters[0].value)).padStart(2, "0");
            },
          },
          1.55
        );
        tl.fromTo(
          counters[1],
          {
            value: 0,
            onUpdate() {
              counters[1].el.textContent = String(Math.round(counters[1].value)).padStart(2, "0");
            },
          },
          {
            value: counters[1].target,
            duration: 1.0,
            ease: "power1.out",
            onUpdate() {
              counters[1].el.textContent = String(Math.round(counters[1].value)).padStart(2, "0");

        );
        tl.fromTo(

              counters[2].el.textContent = String(Math.round(counters[2].value)).padStart(2, "0");
