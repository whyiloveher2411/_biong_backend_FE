<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, height=1920" />
  <title>Short video #9 — AI và việc làm</title>
  <style>
    @font-face { font-family: "Be Vietnam Pro"; font-weight: 400; font-display: swap; src: url("assets/fonts/BeVietnamPro-Regular.ttf") format("truetype"); }
    @font-face { font-family: "Be Vietnam Pro"; font-weight: 600; font-display: swap; src: url("assets/fonts/BeVietnamPro-SemiBold.ttf") format("truetype"); }
    @font-face { font-family: "Be Vietnam Pro"; font-weight: 700; font-display: swap; src: url("assets/fonts/BeVietnamPro-Bold.ttf") format("truetype"); }
    @font-face { font-family: "Be Vietnam Pro"; font-weight: 800; font-display: swap; src: url("assets/fonts/BeVietnamPro-ExtraBold.ttf") format("truetype"); }
    html, body {
      margin: 0; width: 1080px; height: 1920px; overflow: hidden;
      background: #0B0F1A; font-family: "Be Vietnam Pro", system-ui, sans-serif;
    }
    #root {
      position: relative; width: 1080px; height: 1920px; overflow: hidden;
      background: linear-gradient(165deg, #0B0F1A 0%, #151B2B 45%, #1a1030 100%);
    }
    .clip { position: absolute; pointer-events: none; }
    .stock-bg {
      top: 0; left: 0; width: 1080px; height: 1920px;
      min-width: 1080px; min-height: 1920px;
      object-fit: cover; object-position: center center;
      z-index: 4; opacity: 0.38;
    }
    .mesh-gradient {
      position: absolute; inset: 0; z-index: 1;
      background:
        radial-gradient(ellipse 80% 60% at 50% 20%, rgba(99, 102, 241, 0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(254, 138, 126, 0.12) 0%, transparent 55%);
    }
    .floater-sticker {
      z-index: 120; object-fit: contain;
    }
  </style>
</head>
<body>
  <div id="root" data-composition-id="main" data-start="0" data-duration="155.000" data-width="1080" data-height="1920">

    <div class="mesh-gradient"></div>

    <video class="clip stock-bg" id="stock-agitate" src="assets/images/bg_agitate.mp4"
      data-start="16.130" data-duration="19.680" data-track-index="3"
      muted playsinline loop autoplay></video>

      data-start="35.810" data-duration="28.920" data-track-index="3"

    <video class="clip stock-bg" id="stock-compare" src="assets/images/bg_compare.mp4"

      muted playsinline loop autoplay></video>

    <div class="clip hf-ambient-layer" id="ambient-host"
         data-composition-src="compositions/ambient-layer.html"
         data-composition-id="ambient"
         data-start="0" data-duration="155.000" data-track-index="2"
         style="inset:0;z-index:8"></div>

    <img class="clip floater-sticker" id="accent-hook" src="assets/images/accent_hook.webp" alt=""
      data-start="0.060" data-duration="16.070" data-track-index="13"
      style="right:48px;top:38%;width:180px;height:180px" />
    <img class="clip floater-sticker" id="accent-agitate" src="assets/images/accent_agitate.webp" alt=""

    <img class="clip floater-sticker" id="accent-trend" src="assets/images/accent_trend.webp" alt=""
      data-start="101.220" data-duration="48.640" data-track-index="16"
      style="left:40px;top:40%;width:150px;height:150px" />

    <section class="clip beat-host scene" id="beat-1"
      data-composition-src="compositions/beat_1.html" data-composition-id="beat_1"

    <section class="clip beat-host scene" id="beat-2"
      data-composition-src="compositions/beat_2.html" data-composition-id="beat_2"

    <section class="clip beat-host scene" id="beat-3"

    <section class="clip beat-host scene" id="beat-4"
      data-composition-src="compositions/beat_4.html" data-composition-id="beat_4"

      style="inset:0;z-index:340"></section>
    <section class="clip beat-host scene" id="beat-5"
      data-composition-src="compositions/beat_5.html" data-composition-id="beat_5"

    <section class="clip beat-host scene" id="beat-6"

    <audio class="clip" id="narration" src="assets/audio/narration.mp3"

    <div class="clip hf-overlay-brand" id="brand-host"
         data-composition-src="compositions/brand-watermark.html" data-composition-id="brand-watermark"
         data-start="0" data-duration="155.000" data-track-index="21"
         style="inset:0;z-index:9500"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};
    const mainTl = gsap.timeline({ paused: true });
    mainTl.fromTo(".scene", { opacity: 0 }, { opacity: 1, duration: 0.35, stagger: 0.05 }, 0);
    mainTl.fromTo(".floater-sticker", { scale: 0.8, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.4, stagger: 0.08 }, 0.1);
    window.__timelines["main"] = mainTl;
  </script>
</body>
</html>
