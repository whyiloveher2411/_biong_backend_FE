<!DOCTYPE html><html><head><style>html,body{margin:0;width:1080px;height:1920px}</style></head>
<body>
<div id="root" data-composition-id="main" data-duration="30">
  <div class="clip hf-ambient-layer" data-composition-src="compositions/ambient-layer.html"
       data-composition-id="ambient" data-start="0" data-duration="30" data-track-index="2"
       style="position:absolute;inset:0;z-index:8;pointer-events:none"></div>
  <section class="clip beat-host scene" id="beat-1" data-composition-src="compositions/beat_1.html"
  data-composition-id="beat_1" data-start="0" data-duration="5" data-track-index="1"
  style="position:absolute;inset:0;z-index:320;pointer-events:none"></section>
  <section class="clip beat-host scene" id="beat-2" data-composition-src="compositions/beat_2.html"
  data-composition-id="beat_2" data-start="5" data-duration="5" data-track-index="2"
  style="position:absolute;inset:0;z-index:320;pointer-events:none"></section>
  <section class="clip beat-host scene" id="beat-3" data-composition-src="compositions/beat_3.html"
  data-composition-id="beat_3" data-start="10" data-duration="5" data-track-index="3"
  style="position:absolute;inset:0;z-index:320;pointer-events:none"></section>
  <section class="clip beat-host scene" id="beat-4" data-composition-src="compositions/beat_4.html"
  data-composition-id="beat_4" data-start="15" data-duration="5" data-track-index="4"
  style="position:absolute;inset:0;z-index:320;pointer-events:none"></section>
  <section class="clip beat-host scene" id="beat-5" data-composition-src="compositions/beat_5.html"
  data-composition-id="beat_5" data-start="20" data-duration="5" data-track-index="5"
  style="position:absolute;inset:0;z-index:320;pointer-events:none"></section>
  <section class="clip beat-host scene" id="beat-6" data-composition-src="compositions/beat_6.html"
  data-composition-id="beat_6" data-start="25" data-duration="5" data-track-index="6"
  style="position:absolute;inset:0;z-index:320;pointer-events:none"></section>
  <div class="clip hf-overlay-caption" data-composition-src="compositions/captions.html"
       data-start="0" data-duration="30" data-track-index="20"
       style="position:absolute;inset:0;z-index:9000;pointer-events:none"></div>
  <div class="clip hf-overlay-brand" data-composition-src="compositions/brand-watermark.html"
       data-start="0" data-duration="30" data-track-index="21"
       style="position:absolute;inset:0;z-index:9500;pointer-events:none"></div>
  <!-- bgm-chain:begin -->
  <audio id="bgm-1" class="clip bgm-chain-segment" src="assets/audio/bgm_1.mp3"
       data-start="0.000" data-duration="15.000"
       data-track-index="11" data-volume="0.30"></audio>
  <audio id="bgm-2" class="clip bgm-chain-segment" src="assets/audio/bgm_2.mp3"
       data-start="14.500" data-duration="15.500"
       data-track-index="13" data-volume="0.30"></audio>
  <!-- bgm-chain:end -->

<audio class="clip" src="assets/audio/sfx_hook.mp3" data-start="0" data-duration="2" data-track-index="12" data-volume="0.45"></audio>
</div>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
window.__timelines=window.__timelines||{};
const tl=gsap.timeline({paused:true});
tl.fromTo(".scene",{opacity:0},{opacity:1,duration:0.5,stagger:0.05},0);
  /* bgm-chain-fades:begin */
  tl.to("#bgm-1", { volume: 0, duration: 0.5, ease: "none" }, 14.500);
  tl.fromTo("#bgm-2", { volume: 0 }, { volume: 0.3, duration: 0.5, ease: "none" }, 14.500);
  /* bgm-chain-fades:end */
window.__timelines["main"]=tl;
</script>
</body></html>
